# Ombre Brain 专属配置文件 (柠檬 & 鱼鱼定制版)

identity:
  ai_name: "鱼鱼"
  user_name: "柠檬"
  user_display_name: "柠檬"
  user_aliases:
    - "柠檬"
    - "lemon"

gateway:
  enabled: true
  port: 18002
  default_session_id: "lemon-main"
  upstream_default_model: "gpt-4o-mini"
  cooldown_hours: 6
  skip_recent_rounds: 5
  
  # 你的 OpenAI 兼容配置
  upstreams:
    - name: "openai-provider"
      base_url: "https://api.openai.com/v1"
      api_key_env: "OMBRE_GATEWAY_PROVIDER_A_API_KEY"
      models:
        - "gpt-4o-mini"
        - "gpt-4o"
        - "gpt-3.5-turbo"

embedding:
  enabled: true
  model: "Qwen/Qwen3-Embedding-0.6B"
  base_url: "https://api.siliconflow.cn/v1"

write_path:
  semantic_search_timeout_seconds: 3

persona:
  profile_id: "lemon_yuyu_state"
  default_relationship_level: 0.8
  default_intimacy: 0.9

reflection:
  timezone: "Asia/Shanghai"
  enrich_backfill_enabled: true
  enrich_backfill_limit: 5

dream:
  enabled: true
  auto_enabled: true
  surface_enabled: true
  daily_probability: 0.4
